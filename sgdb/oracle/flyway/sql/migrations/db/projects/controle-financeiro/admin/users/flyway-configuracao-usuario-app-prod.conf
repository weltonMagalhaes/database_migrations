# Configuracao para criacao/gestao do usuario APPLICATION no ambiente PROD

# Conexao administrativa do ambiente PROD
flyway.url=${APP_PROD_ADMIN_URL}
flyway.user=${APP_PROD_ADMIN_USER}
flyway.password=${APP_PROD_ADMIN_PASSWORD}
flyway.jdbcProperties.internal_logon=SYSDBA
flyway.defaultSchema=${APP_PROD_ADMIN_USER}
flyway.table=flyway_history_provision_app_prod

flyway.locations=filesystem:./sql/migrations/db/projects/controle-financeiro/admin/users/provision/app-prod
flyway.baselineOnMigrate=true
flyway.baselineVersion=0

# Placeholders usados pelos scripts SQL do APPLICATION PROD
flyway.placeholders.APP_PROD_USER=${APP_PROD_USER}
flyway.placeholders.APP_PROD_PASSWORD=${APP_PROD_PASSWORD}
flyway.placeholders.APP_PROD_DEFAULT_TABLESPACE=${APP_PROD_DEFAULT_TABLESPACE}
flyway.placeholders.APP_PROD_TEMP_TABLESPACE=${APP_PROD_TEMP_TABLESPACE}

