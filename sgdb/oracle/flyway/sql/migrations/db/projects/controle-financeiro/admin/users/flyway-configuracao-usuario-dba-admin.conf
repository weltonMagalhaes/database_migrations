# Configuracoes do Flyway para migrations com usuario privilegiado (SYS ou ADMIN)
# Este arquivo faz a conexao administrativa no banco para executar scripts de criacao/gestao de usuarios.

# URL de conexao administrativa
flyway.url=${ADMIN_URL}

# Usuario administrativo (normalmente SYS no bootstrap)
flyway.user=${ADMIN_USER}

# Senha do usuario administrativo
flyway.password=${ADMIN_PASSWORD}

# Necessario quando ADMIN_USER=SYS para evitar ORA-28009
flyway.jdbcProperties.internal_logon=SYSDBA

# Schema padrao para execucao das migrations administrativas
flyway.defaultSchema=${ADMIN_USER}

# Tabela de historico dedicada ao contexto administrativo de usuarios
flyway.table=flyway_history_admin_users

# Localizacao base de scripts administrativos de usuarios
flyway.locations=filesystem:./sql/migrations/db/projects/controle-financeiro/admin/users

# Baseline para ambientes ja existentes
flyway.baselineOnMigrate=true

# Recomendado para ambientes com conexao inicial intermitente
flyway.connectRetries=10
flyway.connectRetriesInterval=5
