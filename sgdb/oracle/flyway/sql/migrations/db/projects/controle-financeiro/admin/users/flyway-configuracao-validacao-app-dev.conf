# Configuracao para validar migrations de estrutura no schema APPLICATION DEV

flyway.url=${APP_DEV_ADMIN_URL}
flyway.user=${APP_DEV_USER}
flyway.password=${APP_DEV_PASSWORD}
flyway.defaultSchema=${APP_DEV_USER}
flyway.table=flyway_history_validacao_app_dev
flyway.locations=filesystem:./sql/migrations/db/projects/controle-financeiro/application/app-dev
flyway.placeholders.ambiente=${APP_DEV_DATABASE_NAME}

flyway.baselineOnMigrate=true
flyway.connectRetries=10
flyway.connectRetriesInterval=5
