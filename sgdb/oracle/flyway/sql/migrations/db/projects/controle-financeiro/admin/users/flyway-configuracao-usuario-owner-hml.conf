# Configuracao para criacao/gestao do usuario OWNER no ambiente HML

# Conexao administrativa do ambiente HML
flyway.url=${OWNER_HML_ADMIN_URL}
flyway.user=${OWNER_HML_ADMIN_USER}
flyway.password=${OWNER_HML_ADMIN_PASSWORD}
flyway.jdbcProperties.internal_logon=SYSDBA
flyway.defaultSchema=${OWNER_HML_ADMIN_USER}
flyway.table=flyway_history_owner_hml

flyway.locations=filesystem:./sql/migrations/db/projects/controle-financeiro/admin/users/provision/owner-hml

# Placeholders usados pelos scripts SQL do OWNER HML
flyway.placeholders.usuario_nome=${OWNER_HML_USER}
flyway.placeholders.usuario_senha=${OWNER_HML_PASSWORD}
flyway.placeholders.default_tablespace=${OWNER_HML_DEFAULT_TABLESPACE}
flyway.placeholders.temp_tablespace=${OWNER_HML_TEMP_TABLESPACE}
