# Configuracao para criacao/gestao do usuario OWNER no ambiente DEV

# Conexao administrativa do ambiente DEV
flyway.url=${OWNER_DEV_ADMIN_URL}
flyway.user=${OWNER_DEV_ADMIN_USER}
flyway.password=${OWNER_DEV_ADMIN_PASSWORD}
flyway.jdbcProperties.internal_logon=SYSDBA
flyway.defaultSchema=${OWNER_DEV_ADMIN_USER}
flyway.table=flyway_history_provision_owner_dev

flyway.locations=filesystem:./sql/migrations/db/projects/controle-financeiro/admin/users/provision/owner-dev
flyway.baselineOnMigrate=true
flyway.baselineVersion=0

# Placeholders usados pelos scripts SQL do OWNER DEV
flyway.placeholders.OWNER_DEV_USER=${OWNER_DEV_USER}
flyway.placeholders.OWNER_DEV_PASSWORD=${OWNER_DEV_PASSWORD}
flyway.placeholders.OWNER_DEV_DEFAULT_TABLESPACE=${OWNER_DEV_DEFAULT_TABLESPACE}
flyway.placeholders.OWNER_DEV_TEMP_TABLESPACE=${OWNER_DEV_TEMP_TABLESPACE}

