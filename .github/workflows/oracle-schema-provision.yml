name: Oracle Schema Provision

on:
  workflow_dispatch:
    inputs:
      ambiente:
        description: "Ambiente de execucao (usa GitHub Environment para aprovacao)"
        required: true
        type: choice
        options:
          - DEV
          - HML
          - PROD
      dominio:
        description: "Dominio de schema a executar"
        required: true
        type: choice
        options:
          - application
          - owner
          - all
      comando:
        description: "Comando Flyway"
        required: true
        default: migrate
        type: choice
        options:
          - migrate
          - info
          - validate

permissions:
  contents: read

concurrency:
  group: oracle-schema-provision-${{ inputs.ambiente }}
  cancel-in-progress: false

jobs:
  provision:
    name: Provision ${{ inputs.ambiente }} (${{ inputs.dominio }})
    runs-on: [self-hosted, Windows, X64]
    environment: ${{ inputs.ambiente }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar arquivo temporario de variaveis para o Flyway
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $envFile = Join-Path $env:GITHUB_WORKSPACE "sgdb/oracle/flyway/.ci.env"
          @"
          ADMIN_URL=${{ secrets.ADMIN_URL }}
          ADMIN_USER=${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          MIGRATION_INSTALLED_BY=${{ vars.MIGRATION_INSTALLED_BY || 'github-actions' }}

          APP_DEV_ADMIN_URL=${{ secrets.APP_DEV_ADMIN_URL }}
          APP_DEV_ADMIN_USER=${{ secrets.APP_DEV_ADMIN_USER }}
          APP_DEV_ADMIN_PASSWORD=${{ secrets.APP_DEV_ADMIN_PASSWORD }}
          APP_DEV_USER=${{ secrets.APP_DEV_USER }}
          APP_DEV_PASSWORD=${{ secrets.APP_DEV_PASSWORD }}
          APP_DEV_DEFAULT_TABLESPACE=${{ secrets.APP_DEV_DEFAULT_TABLESPACE }}
          APP_DEV_TEMP_TABLESPACE=${{ secrets.APP_DEV_TEMP_TABLESPACE }}
          APP_DEV_DATABASE_NAME=${{ secrets.APP_DEV_DATABASE_NAME }}

          APP_HML_ADMIN_URL=${{ secrets.APP_HML_ADMIN_URL }}
          APP_HML_ADMIN_USER=${{ secrets.APP_HML_ADMIN_USER }}
          APP_HML_ADMIN_PASSWORD=${{ secrets.APP_HML_ADMIN_PASSWORD }}
          APP_HML_USER=${{ secrets.APP_HML_USER }}
          APP_HML_PASSWORD=${{ secrets.APP_HML_PASSWORD }}
          APP_HML_DEFAULT_TABLESPACE=${{ secrets.APP_HML_DEFAULT_TABLESPACE }}
          APP_HML_TEMP_TABLESPACE=${{ secrets.APP_HML_TEMP_TABLESPACE }}
          APP_HML_DATABASE_NAME=${{ secrets.APP_HML_DATABASE_NAME }}

          APP_PROD_ADMIN_URL=${{ secrets.APP_PROD_ADMIN_URL }}
          APP_PROD_ADMIN_USER=${{ secrets.APP_PROD_ADMIN_USER }}
          APP_PROD_ADMIN_PASSWORD=${{ secrets.APP_PROD_ADMIN_PASSWORD }}
          APP_PROD_USER=${{ secrets.APP_PROD_USER }}
          APP_PROD_PASSWORD=${{ secrets.APP_PROD_PASSWORD }}
          APP_PROD_DEFAULT_TABLESPACE=${{ secrets.APP_PROD_DEFAULT_TABLESPACE }}
          APP_PROD_TEMP_TABLESPACE=${{ secrets.APP_PROD_TEMP_TABLESPACE }}
          APP_PROD_DATABASE_NAME=${{ secrets.APP_PROD_DATABASE_NAME }}

          OWNER_DEV_ADMIN_URL=${{ secrets.OWNER_DEV_ADMIN_URL }}
          OWNER_DEV_ADMIN_USER=${{ secrets.OWNER_DEV_ADMIN_USER }}
          OWNER_DEV_ADMIN_PASSWORD=${{ secrets.OWNER_DEV_ADMIN_PASSWORD }}
          OWNER_DEV_USER=${{ secrets.OWNER_DEV_USER }}
          OWNER_DEV_PASSWORD=${{ secrets.OWNER_DEV_PASSWORD }}
          OWNER_DEV_DEFAULT_TABLESPACE=${{ secrets.OWNER_DEV_DEFAULT_TABLESPACE }}
          OWNER_DEV_TEMP_TABLESPACE=${{ secrets.OWNER_DEV_TEMP_TABLESPACE }}
          OWNER_DEV_DATABASE_NAME=${{ secrets.OWNER_DEV_DATABASE_NAME }}

          OWNER_HML_ADMIN_URL=${{ secrets.OWNER_HML_ADMIN_URL }}
          OWNER_HML_ADMIN_USER=${{ secrets.OWNER_HML_ADMIN_USER }}
          OWNER_HML_ADMIN_PASSWORD=${{ secrets.OWNER_HML_ADMIN_PASSWORD }}
          OWNER_HML_USER=${{ secrets.OWNER_HML_USER }}
          OWNER_HML_PASSWORD=${{ secrets.OWNER_HML_PASSWORD }}
          OWNER_HML_DEFAULT_TABLESPACE=${{ secrets.OWNER_HML_DEFAULT_TABLESPACE }}
          OWNER_HML_TEMP_TABLESPACE=${{ secrets.OWNER_HML_TEMP_TABLESPACE }}
          OWNER_HML_DATABASE_NAME=${{ secrets.OWNER_HML_DATABASE_NAME }}

          OWNER_PROD_ADMIN_URL=${{ secrets.OWNER_PROD_ADMIN_URL }}
          OWNER_PROD_ADMIN_USER=${{ secrets.OWNER_PROD_ADMIN_USER }}
          OWNER_PROD_ADMIN_PASSWORD=${{ secrets.OWNER_PROD_ADMIN_PASSWORD }}
          OWNER_PROD_USER=${{ secrets.OWNER_PROD_USER }}
          OWNER_PROD_PASSWORD=${{ secrets.OWNER_PROD_PASSWORD }}
          OWNER_PROD_DEFAULT_TABLESPACE=${{ secrets.OWNER_PROD_DEFAULT_TABLESPACE }}
          OWNER_PROD_TEMP_TABLESPACE=${{ secrets.OWNER_PROD_TEMP_TABLESPACE }}
          OWNER_PROD_DATABASE_NAME=${{ secrets.OWNER_PROD_DATABASE_NAME }}
          "@ | Set-Content -Path $envFile -Encoding UTF8

      - name: Executar Flyway por dominio/ambiente
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $hostWorkdir = Join-Path $env:GITHUB_WORKSPACE "sgdb/oracle/flyway"
          $containerWorkdir = "/workspace"
          $envFile = Join-Path $hostWorkdir ".ci.env"
          $baseConf = "conf/flyway-configuracao_base-controle-finaceiro.conf"
          $envLower = "${{ inputs.ambiente }}".ToLowerInvariant()
          $appConf = "sql/migrations/db/projects/controle-financeiro/admin/users/flyway-configuracao-validacao-app-$envLower.conf"
          $ownerConf = "sql/migrations/db/projects/controle-financeiro/admin/users/flyway-configuracao-validacao-owner-$envLower.conf"
          $flywayCmd = "${{ inputs.comando }}"

          function Import-EnvFile([string]$filePath) {
            Get-Content -Path $filePath | ForEach-Object {
              if ($_ -match '^\s*([A-Za-z_][A-Za-z0-9_]*)=(.*)$') {
                $varName = $Matches[1]
                $varValue = $Matches[2]
                Set-Item -Path "Env:$varName" -Value $varValue
              }
            }
          }

          function Get-LocalFlywayPath() {
            $cmd = Get-Command flyway -ErrorAction SilentlyContinue
            if ($cmd) {
              return $cmd.Source
            }

            $candidate = Get-ChildItem -Path "C:\Program Files" -Directory -Filter "flyway*" -ErrorAction SilentlyContinue |
              Sort-Object Name -Descending |
              ForEach-Object { Join-Path $_.FullName "flyway.cmd" } |
              Where-Object { Test-Path $_ } |
              Select-Object -First 1

            return $candidate
          }

          function Invoke-LocalFlyway([string]$confFile) {
            $flywayPath = Get-LocalFlywayPath
            if (-not $flywayPath) {
              throw "Flyway local nao encontrado. Instale o Flyway no runner ou adicione ao PATH."
            }

            Write-Host "Executando Flyway local: $flywayPath"
            Import-EnvFile -filePath $envFile

            Push-Location $hostWorkdir
            try {
              & $flywayPath "-configFiles=$baseConf,$confFile" $flywayCmd
              if ($LASTEXITCODE -ne 0) {
                throw "Flyway local retornou codigo $LASTEXITCODE."
              }
            }
            finally {
              Pop-Location
            }
          }

          function Run-Flyway([string]$confFile) {
            Write-Host "Executando $flywayCmd com $confFile"

            $dockerCmd = Get-Command docker -ErrorAction SilentlyContinue
            if ($dockerCmd) {
              try {
                & docker run --rm `
                  --env-file "$envFile" `
                  -v "${hostWorkdir}:${containerWorkdir}" `
                  -w "$containerWorkdir" `
                  --entrypoint /flyway/flyway `
                  redgate/flyway:10.15.0 `
                  "-configFiles=$baseConf,$confFile" `
                  "$flywayCmd"

                if ($LASTEXITCODE -ne 0) {
                  throw "Docker Flyway retornou codigo $LASTEXITCODE."
                }

                return
              }
              catch {
                Write-Warning "Falha ao executar via Docker: $($_.Exception.Message)"
                Write-Warning "Tentando fallback para Flyway local..."
              }
            }
            else {
              Write-Warning "Docker nao encontrado no PATH do runner. Usando Flyway local."
            }

            Invoke-LocalFlyway -confFile $confFile
          }

          switch ("${{ inputs.dominio }}") {
            "application" { Run-Flyway $appConf }
            "owner"       { Run-Flyway $ownerConf }
            "all"         { Run-Flyway $appConf; Run-Flyway $ownerConf }
            default       { throw "Dominio invalido: ${{ inputs.dominio }}" }
          }

      - name: Remover arquivo temporario de variaveis
        if: always()
        shell: pwsh
        run: |
          $envFile = Join-Path $env:GITHUB_WORKSPACE "sgdb/oracle/flyway/.ci.env"
          if (Test-Path $envFile) {
            Remove-Item -LiteralPath $envFile -Force
          }
